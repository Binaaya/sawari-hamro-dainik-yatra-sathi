<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sawari Admin</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../shared/css/common.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #030213 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #10B981, #3B82F6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.2s ease;
      background-color: #F9FAFB;
    }

    .form-input:focus {
      outline: none;
      border-color: #10B981;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #10B981, #059669);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-message {
      background-color: #FEF2F2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-container">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="white" viewBox="0 0 24 24">
            <path d="M17 20H7V8H17V20ZM9 10V18H15V10H9ZM20 4H4V6H20V4ZM7 2H17V4H7V2ZM4 20H2V8H4V20ZM22 8V20H20V8H22Z"/>
          </svg>
        </div>
        <div>
          <h1 style="font-size: 24px; font-weight: 700; color: #111827; margin: 0;">Sawari</h1>
          <p style="font-size: 13px; color: #6B7280; margin: 0;">Admin Portal</p>
        </div>
      </div>

      <!-- Error Message -->
      <div id="error-message" class="error-message"></div>

      <!-- Login Form -->
      <form id="login-form">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #374151;">
            Email Address
          </label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="admin@sawari.com"
            required
            autocomplete="email"
          >
        </div>

        <div style="margin-bottom: 24px;">
          <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #374151;">
            Password
          </label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" id="login-btn" class="btn-login">
          <span id="btn-text">Sign In</span>
        </button>
      </form>

      <!-- Footer -->
      <p style="text-align: center; margin-top: 24px; font-size: 13px; color: #9CA3AF;">
        Sawari Transit Management System
      </p>
    </div>
  </div>

  <!-- Firebase Init -->
  <script src="../shared/js/firebase-init.js"></script>

  <script type="module">
    import { auth } from './assets/js/auth.js';
    import { Toast } from './assets/js/components/toast.js';

    // Check if already logged in
    auth.checkAuth().then(user => {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    // Form submission
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear previous error
      errorDiv.classList.remove('show');
      errorDiv.textContent = '';

      // Show loading state
      loginBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const result = await auth.signIn(email, password);

        if (result.success) {
          window.location.href = 'index.html';
        } else {
          errorDiv.textContent = result.error || 'Login failed. Please try again.';
          errorDiv.classList.add('show');
          loginBtn.disabled = false;
          btnText.textContent = 'Sign In';
        }
      } catch (error) {
        errorDiv.textContent = 'An unexpected error occurred. Please try again.';
        errorDiv.classList.add('show');
        loginBtn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
